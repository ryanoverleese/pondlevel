<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pond Level Monitor — G215091</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #86868b; margin-bottom: 24px; }

    .grid { display: grid; grid-template-columns: 240px 1fr; gap: 16px; align-items: start; }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }
    .card h2 { font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: #86868b; margin-bottom: 14px; }

    /* Big depth number */
    .depth-display {
      text-align: center;
      padding: 8px 0 16px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 16px;
    }
    .depth-value { font-size: 72px; font-weight: 700; letter-spacing: -0.04em; line-height: 1; }
    .depth-unit { font-size: 18px; font-weight: 500; color: #86868b; margin-top: 4px; }
    .depth-sub { font-size: 13px; color: #86868b; margin-top: 6px; }

    /* Stats row */
    .stats { display: flex; gap: 0; }
    .stat { flex: 1; text-align: center; padding: 0 8px; }
    .stat + .stat { border-left: 1px solid #f0f0f0; }
    .stat-val { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
    .stat-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.07em; color: #86868b; margin-top: 3px; }
    .up { color: #34c759; }
    .down { color: #ff9500; }
    .flat { color: #86868b; }

    /* Probe diagram */
    .probe-wrap { display: flex; justify-content: center; padding: 8px 0; }
    .probe-tube { width: 100%; }

    /* Event log table */
    .event-current {
      display: flex; align-items: baseline; gap: 10px;
      padding: 12px 8px 14px;
      border-bottom: 2px solid #e5e5ea;
      margin-bottom: 4px;
    }
    .event-current-depth { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; color: #1d1d1f; }
    .event-current-label { font-size: 13px; color: #86868b; }
    .event-current-rate  { font-size: 13px; font-weight: 600; margin-left: auto; }

    .event-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .event-table th { text-align: left; padding: 4px 8px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; color: #86868b;
      border-bottom: 1px solid #f0f0f0; }
    .event-table td { padding: 8px 8px; border-bottom: 1px solid #f8f8f8; vertical-align: middle; }
    .event-table tr:last-child td { border-bottom: none; }
    .event-table td.ev-time  { color: #86868b; font-size: 12px; white-space: nowrap; }
    .event-table td.ev-event { font-weight: 500; }
    .event-table td.ev-rate  { color: #86868b; font-size: 12px; text-align: right; white-space: nowrap; }
    .event-table td.ev-dur   { color: #86868b; font-size: 12px; text-align: right; white-space: nowrap; }
    .ev-up   { color: #2563eb; font-weight: 700; margin-right: 5px; }
    .ev-down { color: #ff9500; font-weight: 700; margin-right: 5px; }
    .ev-pre  { color: #c7c7cc; }

    /* Chart */
    .chart-wrap { position: relative; height: 220px; }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .chart-header h2 { margin-bottom: 0; }
    .range-tabs { display: flex; gap: 4px; }
    .range-tab { padding: 4px 10px; font-size: 12px; font-weight: 600; border: 1px solid #d2d2d7;
      border-radius: 6px; background: #fff; cursor: pointer; color: #86868b; }
    .range-tab.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    /* Last updated */
    .updated { font-size: 12px; color: #86868b; margin-top: 8px; }

    /* Measure tool */
    .measure-btn { padding: 4px 10px; font-size: 12px; font-weight: 600; border: 1px solid #d2d2d7;
      border-radius: 6px; background: #fff; cursor: pointer; color: #86868b; margin-left: 6px; }
    .measure-btn.active { background: #f59e0b; border-color: #f59e0b; color: #fff; }
    .measure-hint { font-size: 11px; color: #f59e0b; font-weight: 600; margin-top: 6px; display: none; }
    .measure-hint.visible { display: block; }
    .measure-result {
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px;
      padding: 12px 16px; margin-top: 10px; display: none;
      grid-template-columns: repeat(4, 1fr); gap: 8px;
    }
    .measure-result.visible { display: grid; }
    .measure-stat { text-align: center; }
    .measure-stat-val { font-size: 18px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.02em; }
    .measure-stat-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #92400e; margin-top: 2px; }

    /* Predictions */
    .pred-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .pred-table th { text-align: left; padding: 4px 8px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; color: #86868b;
      border-bottom: 1px solid #f0f0f0; }
    .pred-table td { padding: 8px 8px; border-bottom: 1px solid #f8f8f8; vertical-align: middle; }
    .pred-table tr:last-child td { border-bottom: none; }
    .pred-target { font-weight: 600; color: #1d1d1f; }
    .pred-est    { font-weight: 500; color: #2563eb; }
    .pred-hist   { color: #86868b; font-size: 12px; }
    .pred-na     { color: #c7c7cc; }
    .pred-basis  { font-size: 12px; color: #86868b; margin-bottom: 12px; }

    /* PIN modal */
    .pin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex;
      align-items: center; justify-content: center; z-index: 1000; }
    .pin-modal { background: #fff; border-radius: 20px; padding: 28px 24px; width: 260px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18); text-align: center; }
    .pin-modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
    .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #d2d2d7; background: #fff; transition: background 0.15s; }
    .pin-dot.filled { background: #2563eb; border-color: #2563eb; }
    .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .pin-key { padding: 16px; border: none; border-radius: 12px; background: #f5f5f7;
      font-size: 20px; font-weight: 600; cursor: pointer; transition: background 0.1s; }
    .pin-key:hover { background: #e5e5ea; }
    .pin-key.del { font-size: 16px; color: #86868b; }
    .pin-key.cancel { font-size: 14px; color: #ff3b30; background: #fff0f0; }

    /* Valve status */
    .valve-status { display: inline-flex; align-items: center; gap: 7px; margin-top: 10px;
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .valve-status.valve-on  { background: #dcfce7; color: #15803d; }
    .valve-status.valve-off { background: #f5f5f7; color: #86868b; }
    .valve-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .valve-on  .valve-dot { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.25); animation: pulse 1.5s infinite; }
    .valve-off .valve-dot { background: #86868b; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 3px rgba(34,197,94,0.25); } 50% { box-shadow: 0 0 0 6px rgba(34,197,94,0.1); } }

    /* Valve log card — collapsed by default */
    .valve-card { cursor: pointer; padding: 10px 16px; }
    .valve-card-collapsed { display: flex; align-items: center; gap: 8px; }
    .valve-card-collapsed .valve-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .valve-card-collapsed .vc-label { font-size: 12px; color: #86868b; }
    .valve-card-expanded { display: none; padding-top: 12px; }
    .valve-card.open .valve-card-expanded { display: block; }
    .valve-card.open { padding: 16px; cursor: default; }

    .pump-btns { display: flex; gap: 10px; }
    .pump-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 15px;
      font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .pump-btn:hover { opacity: 0.85; }
    .pump-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .pump-on  { background: #2563eb; color: #fff; }
    .pump-off { background: #e5e5ea; color: #1d1d1f; }
    .pump-confirm { font-size: 12px; color: #34c759; margin-top: 8px; min-height: 18px; }
    .pump-lock { font-size: 12px; color: #86868b; margin-top: 8px; cursor: pointer; text-decoration: underline; }
    .ev-pump { color: #34c759; font-weight: 700; margin-right: 5px; }
    .ev-pump-off { color: #86868b; font-weight: 700; margin-right: 5px; }

    /* Loading / error */
    .loading { text-align: center; padding: 40px; color: #86868b; }
    .error { color: #ff3b30; font-size: 14px; padding: 16px 0; }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .card { padding: 14px; }
      .event-table, .pred-table { font-size: 11px; }
      .event-table th, .event-table td,
      .pred-table th, .pred-table td { padding: 6px 4px; }
    }
  </style>
</head>
<body>

<!-- Hidden Netlify form for pump logging -->
<form name="pump-log" netlify hidden>
  <input name="action" />
  <input name="ts" />
  <input name="depth" />
</form>

<h1>Pond Level Monitor</h1>
<p class="subtitle">G215091 · Pasture · Live from CropX</p>

<div id="app">
  <div class="loading">Loading sensor data...</div>
</div>

<script>
  const DEPTH_OFFSET   = 44;
  const MAX_DEPTH      = 42;
  const WET_THRESHOLD  = 15;
  const HOURS = 168;
  const SENSOR_DEPTHS_FROM_TOP = [34, 30, 26, 22, 18, 14, 10, 6, 2];
  const FLOW_RATE_GPM  = 5.1;

  async function getData() {
    const resp = await fetch("./pond_data.json");
    if (!resp.ok) throw new Error(`Could not load pond_data.json (${resp.status})`);
    const d = await resp.json();
    if (d.error) throw new Error(d.error);
    return { sensors: d.sensors || [], history: d.history || [], pump: d.pump || [], fetched: d.fetched };
  }

  const PUMP_PIN = "2580";

  function isUnlocked() {
    return localStorage.getItem("pump_auth") === PUMP_PIN;
  }

  function renderPumpLock() {
    const onBtn  = document.querySelector(".pump-on");
    const offBtn = document.querySelector(".pump-off");
    const lockEl = document.getElementById("pump-lock");
    if (isUnlocked()) {
      if (onBtn)  onBtn.disabled  = false;
      if (offBtn) offBtn.disabled = false;
      if (lockEl) lockEl.textContent = "Locked? Click to lock.";
    } else {
      if (onBtn)  onBtn.disabled  = true;
      if (offBtn) offBtn.disabled = true;
      if (lockEl) lockEl.textContent = "🔒 Tap to unlock";
    }
    refreshValveBtns();
  }

  function refreshValveBtns() {
    const onBtn  = document.querySelector(".pump-on");
    const offBtn = document.querySelector(".pump-off");
    if (!onBtn || !offBtn) return;
    if (window._valveOn) {
      onBtn.style.background  = "#e5e5ea"; onBtn.style.color  = "#86868b";
      offBtn.style.background = "#ef4444"; offBtn.style.color = "#fff";
    } else {
      onBtn.style.background  = "#2563eb"; onBtn.style.color  = "#fff";
      offBtn.style.background = "#e5e5ea"; offBtn.style.color = "#1d1d1f";
    }
  }

  window.expandValveCard = function() {
    const card = document.getElementById("valve-card");
    if (!card.classList.contains("open")) {
      card.classList.add("open");
      renderPumpLock();
    }
  };
  window.collapseValveCard = function() {
    document.getElementById("valve-card").classList.remove("open");
  };

  function toggleLock() {
    if (isUnlocked()) {
      localStorage.removeItem("pump_auth");
      renderPumpLock();
      return;
    }
    // Show PIN modal with hidden tel input to trigger iOS numeric keyboard
    const overlay = document.createElement("div");
    overlay.className = "pin-overlay";
    overlay.innerHTML = `
      <div class="pin-modal">
        <h3>Enter PIN</h3>
        <div class="pin-dots">
          <div class="pin-dot" id="pd0"></div>
          <div class="pin-dot" id="pd1"></div>
          <div class="pin-dot" id="pd2"></div>
          <div class="pin-dot" id="pd3"></div>
        </div>
        <input id="pin-input" type="tel" inputmode="numeric" pattern="[0-9]*"
          maxlength="4" autocomplete="off"
          style="position:absolute;opacity:0;width:1px;height:1px;top:0;left:0;" />
        <button class="pin-key cancel" style="width:100%;margin-top:16px;" onclick="pinCancel()">Cancel</button>
      </div>
    `;
    document.body.appendChild(overlay);

    const input = document.getElementById("pin-input");
    input.focus();

    input.addEventListener("input", () => {
      const val = input.value.replace(/\D/g, "").slice(0, 4);
      input.value = val;
      // Update dots
      for (let i = 0; i < 4; i++) {
        document.getElementById(`pd${i}`).classList.toggle("filled", i < val.length);
        document.getElementById(`pd${i}`).style.borderColor = "";
      }
      if (val.length === 4) {
        setTimeout(() => {
          if (val === PUMP_PIN) {
            localStorage.setItem("pump_auth", PUMP_PIN);
            renderPumpLock();
            document.body.removeChild(overlay);
          } else {
            document.querySelectorAll(".pin-dot").forEach(d => { d.classList.remove("filled"); d.style.borderColor = "#ff3b30"; });
            setTimeout(() => { input.value = ""; document.querySelectorAll(".pin-dot").forEach(d => d.style.borderColor = ""); }, 600);
          }
        }, 150);
      }
    });

    window.pinCancel = function() { document.body.removeChild(overlay); };
  }

  async function logPump(action, currentDepth) {
    if (!isUnlocked()) return;
    const formData = new FormData();
    formData.append("form-name", "pump-log");
    formData.append("action", action);
    formData.append("ts", new Date().toISOString());
    formData.append("depth", currentDepth);
    await fetch("/", { method: "POST", body: formData });
    // Save state + timestamp to localStorage for instant display
    const valveState = { action, ts: new Date().toISOString(), depth: currentDepth };
    localStorage.setItem("valve_state", JSON.stringify(valveState));
    window._valveOn = action === "on";
    refreshValveBtns();
    updateValveBadge(action === "on", valveState.ts);
    const confirm = document.getElementById("pump-confirm");
    confirm.textContent = action === "on" ? "Valve ON logged ✓" : "Valve OFF logged ✓";
    setTimeout(() => confirm.textContent = "", 3000);
  }

  function updateValveBadge(isOn, ts) {
    const badge = document.getElementById("valve-badge");
    if (!badge) return;
    const elapsed = ts ? fmtDuration(Date.now() - new Date(ts).getTime()) : null;
    badge.className = `valve-status ${isOn ? "valve-on" : "valve-off"}`;
    badge.innerHTML = `<span class="valve-dot"></span> Valve ${isOn ? "ON" : "OFF"}${elapsed ? ` &nbsp;·&nbsp; ${elapsed} on this cycle` : ""}`;
  }

  function buildSensorTimelines(sensors) {
    const tl = {};
    for (const s of sensors) {
      const d = s.metaData.depth.value;
      tl[d] = s.timestamps.map((ts, i) => ({ ts, vwc: s.values[i] ?? 0 }))
                           .sort((a, b) => a.ts - b.ts);
    }
    return tl;
  }

  function computeWaterDepthTimeline(sensors) {
    const timeline = {};
    for (const s of sensors) {
      const depth = s.metaData.depth.value;
      s.timestamps.forEach((ts, i) => {
        if (!timeline[ts]) timeline[ts] = {};
        timeline[ts][depth] = s.values[i] ?? 0;
      });
    }
    return Object.entries(timeline)
      .sort(([a], [b]) => Number(a) - Number(b))
      .map(([ts, readings]) => {
        let waterlineSensor = null;
        for (const d of SENSOR_DEPTHS_FROM_TOP.slice().reverse()) {
          if (readings[d] >= WET_THRESHOLD) { waterlineSensor = d; break; }
        }
        const wd = waterlineSensor !== null ? DEPTH_OFFSET - waterlineSensor : 0;
        return { ts: Number(ts), waterDepth: Math.max(0, wd) };
      });
  }

  function computeFillTimeline(sensorTimelines) {
    return SENSOR_DEPTHS_FROM_TOP.map(d => {
      const readings = sensorTimelines[d] || [];
      const waterDepth = DEPTH_OFFSET - d;
      const hitIdx = readings.findIndex(r => r.vwc >= WET_THRESHOLD);
      const hitAt = hitIdx >= 0 ? readings[hitIdx].ts : null;
      let driedAt = null;
      if (hitIdx >= 0) {
        const dr = readings.slice(hitIdx + 1).find(r => r.vwc < WET_THRESHOLD);
        driedAt = dr ? dr.ts : null;
      }
      return { depthFromTop: d, waterDepth, hitAt, driedAt };
    });
  }

  function fillRate(points) {
    const now = Date.now();
    const recent = points.filter(p => p.ts > now - 12 * 3600 * 1000);
    if (recent.length < 2) return null;
    const first = recent[0], last = recent[recent.length - 1];
    const hrs = (last.ts - first.ts) / 3600000;
    if (hrs < 0.05) return null;
    return (last.waterDepth - first.waterDepth) / hrs;
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleString("en-US", {
      month: "numeric", day: "numeric",
      hour: "numeric", minute: "2-digit"
    });
  }

  function fmtDuration(ms) {
    const totalMin = Math.round(ms / 60000);
    if (totalMin < 60) return `${totalMin} min`;
    const h = Math.floor(totalMin / 60), m = totalMin % 60;
    return m === 0 ? `${h} hr` : `${h} hr ${m} min`;
  }

  function renderProbe(sensorTimelines) {
    const svgW = 320, svgH = 210;
    const bowlTopY = 22, bowlBotY = 194;
    const bowlH = bowlBotY - bowlTopY;
    const tL = 42, tR = 278, bL = 130, bR = 190;

    function edgeAt(y) {
      const t = (y - bowlTopY) / bowlH;
      return { left: tL + t * (bL - tL), right: tR - t * (tR - bR) };
    }

    const SEDIMENT = new Set([30, 34]);
    const sensorData = SENSOR_DEPTHS_FROM_TOP
      .filter(d => !SEDIMENT.has(d))
      .map(d => {
        const readings = sensorTimelines[d] || [];
        const vwc = readings.length ? readings[readings.length - 1].vwc : 0;
        return { waterDepth: DEPTH_OFFSET - d, wet: vwc >= WET_THRESHOLD };
      });

    let curDepth = 0;
    for (const s of [...sensorData].reverse()) {
      if (s.wet) { curDepth = s.waterDepth; break; }
    }

    const waterFrac = Math.min(1, curDepth / MAX_DEPTH);
    const waterY = bowlBotY - waterFrac * bowlH;
    const { left: wL, right: wR } = edgeAt(waterY);

    let dots = '';
    for (const s of sensorData) {
      const sY = bowlBotY - (s.waterDepth / MAX_DEPTH) * bowlH;
      const { left, right } = edgeAt(sY);
      const fill = s.wet ? '#2563eb' : '#d1d5db';
      dots += `<circle cx="${(left - 7).toFixed(1)}" cy="${sY.toFixed(1)}" r="4" fill="${fill}"/>`;
      dots += `<circle cx="${(right + 7).toFixed(1)}" cy="${sY.toFixed(1)}" r="4" fill="${fill}"/>`;
      dots += `<text x="${(left - 15).toFixed(1)}" y="${(sY + 4).toFixed(1)}" font-size="9" fill="#9ca3af" text-anchor="end">${s.waterDepth}"</text>`;
      dots += `<text x="${(right + 15).toFixed(1)}" y="${(sY + 4).toFixed(1)}" font-size="9" fill="#9ca3af">${s.waterDepth}"</text>`;
    }

    const labelY = waterY + Math.min(22, (bowlBotY - waterY) / 2 + 10);
    const clipPath = `M ${tL},${bowlTopY} C ${tL+2},${bowlTopY+105} ${bL-8},${bowlBotY-18} ${bL},${bowlBotY} L ${bR},${bowlBotY} C ${bR+8},${bowlBotY-18} ${tR-2},${bowlTopY+105} ${tR},${bowlTopY} Z`;
    const outline  = `M ${tL},${bowlTopY} C ${tL+2},${bowlTopY+105} ${bL-8},${bowlBotY-18} ${bL},${bowlBotY} L ${bR},${bowlBotY} C ${bR+8},${bowlBotY-18} ${tR-2},${bowlTopY+105} ${tR},${bowlTopY}`;

    const tubeHtml = `
      <svg viewBox="0 0 ${svgW} ${svgH}" width="100%" style="max-width:300px;display:block;margin:0 auto">
        <defs><clipPath id="bowl-clip"><path d="${clipPath}"/></clipPath></defs>
        ${curDepth > 0 ? `<rect x="0" y="${waterY.toFixed(1)}" width="${svgW}" height="${svgH}" fill="#bfdbfe" clip-path="url(#bowl-clip)" opacity="0.85"/>` : ''}
        <path d="${outline}" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
        ${dots}
        ${curDepth > 0 ? `<line x1="${wL.toFixed(1)}" y1="${waterY.toFixed(1)}" x2="${wR.toFixed(1)}" y2="${waterY.toFixed(1)}" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>` : ''}
        ${curDepth > 0 ? `<text x="${(svgW/2).toFixed(1)}" y="${labelY.toFixed(1)}" font-size="13" font-weight="700" fill="#1d4ed8" text-anchor="middle">${curDepth}"</text>` : ''}
      </svg>`;
    return { tubeHtml };
  }

  // Returns a Map: onTs → gallons used (for completed cycles only)
  function computeCycleGallons(pumpEvents) {
    const sorted = [...(pumpEvents || [])].sort((a, b) => new Date(a.ts) - new Date(b.ts));
    const result = new Map();
    for (let i = 0; i < sorted.length; i++) {
      if (sorted[i].action !== "on") continue;
      const off = sorted.slice(i + 1).find(e => e.action === "off");
      if (!off) continue;
      const mins = (new Date(off.ts) - new Date(sorted[i].ts)) / 60000;
      result.set(new Date(sorted[i].ts).getTime(), Math.round(mins * FLOW_RATE_GPM));
    }
    return result;
  }

  function renderEventLog(fillTimeline, historyEvents, currentDepth, rate, pumpEvents) {
    const cycleGallons = computeCycleGallons(pumpEvents);
    const SEDIMENT_DEPTHS = new Set([10, 14]);
    const events = [];
    // Use history events first — they have accurate cron-detected timestamps
    const covered = new Set();
    for (const h of (historyEvents || [])) {
      if (SEDIMENT_DEPTHS.has(h.depth)) continue;
      events.push({ ts: h.ts, dir: h.dir, depth: h.depth });
      covered.add(`${h.depth}-${h.dir}`);
    }
    // Fill in any depths not covered by history (e.g. pre-data events)
    for (const item of fillTimeline) {
      if (SEDIMENT_DEPTHS.has(item.waterDepth)) continue;
      if (item.hitAt   && !covered.has(`${item.waterDepth}-up`))   events.push({ ts: item.hitAt,   dir: "up",   depth: item.waterDepth });
      if (item.driedAt && !covered.has(`${item.waterDepth}-down`)) events.push({ ts: item.driedAt, dir: "down", depth: item.waterDepth });
    }
    for (const p of (pumpEvents || [])) {
      events.push({ ts: new Date(p.ts).getTime(), dir: p.action === "on" ? "pump-on" : "pump-off", depth: p.depth });
    }
    events.sort((a, b) => b.ts - a.ts);

    const rateStr = rate === null ? "Stable"
      : rate > 0.05  ? `+${rate.toFixed(1)}" /hr`
      : rate < -0.05 ? `${rate.toFixed(1)}" /hr`
      : "Stable";
    const rateColor = rate === null ? "#86868b"
      : rate > 0.05 ? "#2563eb" : rate < -0.05 ? "#ff9500" : "#86868b";

    let html = `
      <div class="event-current">
        <div class="event-current-depth">${currentDepth}"</div>
        <div class="event-current-label">current depth &nbsp;·&nbsp; ${(currentDepth/12).toFixed(2)} ft</div>
        <div class="event-current-rate" style="color:${rateColor}">${rateStr}</div>
      </div>
      <table class="event-table">
        <thead><tr>
          <th>Time</th>
          <th>Event</th>
          <th style="text-align:right">Duration</th>
          <th style="text-align:right">Rate</th>
        </tr></thead>
        <tbody>
    `;

    for (let i = 0; i < events.length; i++) {
      const ev = events[i];
      const next = events[i + 1];
      let durCell = "—", rateCell = "—";
      const isDepthEv = ev.dir === "up" || ev.dir === "down";
      const nextDepth = events.slice(i + 1).find(e => e.dir === "up" || e.dir === "down");
      if (isDepthEv && nextDepth) {
        const gap = ev.ts - nextDepth.ts;
        const inches = Math.abs(ev.depth - nextDepth.depth);
        if (gap > 60000) {
          durCell = fmtDuration(gap);
          rateCell = inches > 0 ? `${(inches / (gap / 3600000)).toFixed(1)} in/hr` : "—";
        }
      }
      let icon, label;
      if (ev.dir === "up") {
        icon = `<span class="ev-up">↑</span>`;
        label = `${ev.depth}"`;
      } else if (ev.dir === "down") {
        icon = `<span class="ev-down">↓</span>`;
        // Show the depth it dropped TO (next sensor below the crossing depth)
        const waterDepths = SENSOR_DEPTHS_FROM_TOP.map(d => DEPTH_OFFSET - d).sort((a, b) => a - b);
        const below = waterDepths.filter(d => d < ev.depth);
        const toDepth = below.length ? below[below.length - 1] : 0;
        label = `${toDepth}"`;
      }
      else if (ev.dir === "pump-on")  {
        icon = `<span class="ev-pump">⏻</span>`;
        const gal = cycleGallons.get(ev.ts);
        label = `Valve ON${ev.depth ? ` · ${ev.depth}"` : ""}${gal ? ` · ~${gal.toLocaleString()} gal` : ""}`;
      }
      else                       { icon = `<span class="ev-pump-off">⏻</span>`;   label = `Valve OFF${ev.depth ? ` · ${ev.depth}"` : ""}`; }
      html += `<tr>
        <td class="ev-time">${fmtTime(ev.ts)}</td>
        <td class="ev-event">${icon}${label}</td>
        <td class="ev-dur">${durCell}</td>
        <td class="ev-rate">${rateCell}</td>
      </tr>`;
    }

    const preData = fillTimeline.filter(x => !x.hitAt && !x.driedAt);
    if (preData.length) {
      for (const item of preData) {
        html += `<tr>
          <td class="ev-time ev-pre">pre-data</td>
          <td class="ev-event ev-pre"><span class="ev-up">↑</span>Rose past ${item.waterDepth}"</td>
          <td class="ev-dur ev-pre">—</td>
          <td class="ev-rate ev-pre">—</td>
        </tr>`;
      }
    }

    html += `</tbody></table>`;
    return html;
  }

  // ── Predictions ─────────────────────────────────────────────────────────────

  function renderValveLog(pumpEvents) {
    const sorted = [...(pumpEvents || [])].sort((a, b) => new Date(b.ts) - new Date(a.ts));
    if (!sorted.length) return `<p style="color:#86868b;font-size:14px;">No valve events recorded yet.</p>`;

    // Pair ON events with the next OFF
    const asc = [...sorted].reverse();
    const cycles = [];
    for (let i = 0; i < asc.length; i++) {
      if (asc[i].action !== "on") continue;
      const off = asc.slice(i + 1).find(e => e.action === "off");
      const onTs  = new Date(asc[i].ts).getTime();
      const offTs = off ? new Date(off.ts).getTime() : null;
      const durMs = offTs ? offTs - onTs : Date.now() - onTs;
      const gal   = Math.round((durMs / 60000) * FLOW_RATE_GPM);
      cycles.push({ onTs, offTs, durMs, gal, active: !offTs });
    }
    cycles.sort((a, b) => b.onTs - a.onTs);

    let html = `<table class="event-table"><thead><tr>
      <th>Started</th><th>Ended</th><th style="text-align:right">Duration</th><th style="text-align:right">Est. Gallons</th>
    </tr></thead><tbody>`;
    for (const c of cycles) {
      html += `<tr>
        <td class="ev-time">${fmtTime(c.onTs)}</td>
        <td class="ev-time">${c.active ? `<span style="color:#22c55e;font-weight:600;">Active</span>` : fmtTime(c.offTs)}</td>
        <td class="ev-dur">${fmtDuration(c.durMs)}${c.active ? " so far" : ""}</td>
        <td class="ev-rate">~${c.gal.toLocaleString()} gal</td>
      </tr>`;
    }
    html += `</tbody></table>`;
    return html;
  }

  function renderPredictions(historyEvents, currentDepth, rate, pumpEvents) {
    const DEPTHS = SENSOR_DEPTHS_FROM_TOP.map(d => DEPTH_OFFSET - d).sort((a, b) => a - b);
    const targets = DEPTHS.filter(d => d !== currentDepth);

    // Build valve-on ranges from pump events
    const pumpSorted = [...(pumpEvents || [])].sort((a, b) => new Date(a.ts) - new Date(b.ts));
    const valveRanges = [];
    for (let i = 0; i < pumpSorted.length; i++) {
      if (pumpSorted[i].action !== "on") continue;
      const onTs  = new Date(pumpSorted[i].ts).getTime();
      const offEv = pumpSorted.slice(i + 1).find(p => p.action === "off");
      const offTs = offEv ? new Date(offEv.ts).getTime() : Infinity;
      valveRanges.push([onTs, offTs]);
    }
    function isValveOn(ts) {
      return valveRanges.some(([on, off]) => ts >= on && ts <= off);
    }

    // Split history crossings into valve-on vs natural buckets
    function buildRateMap(events) {
      const map = {};
      const sorted = [...events].sort((a, b) => a.ts - b.ts);
      for (let i = 1; i < sorted.length; i++) {
        const prev = sorted[i - 1], curr = sorted[i];
        const dHrs = (curr.ts - prev.ts) / 3600000;
        if (dHrs > 0 && dHrs < 72) {
          const key = `${prev.depth}:${curr.depth}`;
          if (!map[key]) map[key] = [];
          map[key].push(Math.abs(curr.depth - prev.depth) / dHrs);
        }
      }
      return map;
    }

    const valveEvents   = historyEvents.filter(e => isValveOn(e.ts));
    const naturalEvents = historyEvents.filter(e => !isValveOn(e.ts));
    const valveRateMap   = buildRateMap(valveEvents);
    const naturalRateMap = buildRateMap(naturalEvents);

    function avgRate(map, from, to) {
      const arr = map[`${from}:${to}`] || [];
      if (!arr.length) return null;
      return arr.reduce((s, v) => s + v, 0) / arr.length;
    }

    function fmtEta(hours) {
      if (hours < 0 || hours > 999) return null;
      const eta = new Date(Date.now() + hours * 3600000);
      return eta.toLocaleString("en-US", { month: "numeric", day: "numeric", hour: "numeric", minute: "2-digit" });
    }

    const rising    = rate !== null && rate > 0.05;
    const draining  = rate !== null && rate < -0.05;
    const direction = rising ? "up" : draining ? "down" : null;
    const valveNow  = isValveOn(Date.now());

    const filteredTargets = direction === "up"
      ? targets.filter(d => d > currentDepth)
      : direction === "down"
        ? targets.filter(d => d < currentDepth)
        : targets.filter(d => d !== currentDepth);

    if (!filteredTargets.length && !direction) {
      return `<div class="pred-basis">No active fill or drain detected. Predictions will appear once water is moving.</div>`;
    }

    const modeLabel = valveNow ? "Valve On" : "Natural";
    const histRateMap = valveNow ? valveRateMap : naturalRateMap;
    const histCycles  = valveNow ? valveEvents.length : naturalEvents.length;

    let html = direction
      ? `<div class="pred-basis">${rising ? "Filling" : "Draining"} at ${rate > 0 ? "+" : ""}${rate.toFixed(2)}"/hr (12-hr avg) · <strong>${modeLabel}</strong> · ${histCycles} crossing${histCycles !== 1 ? "s" : ""} in history</div>`
      : `<div class="pred-basis">Water stable · <strong>${modeLabel}</strong> · ${histCycles} crossing${histCycles !== 1 ? "s" : ""} in history</div>`;

    html += `<table class="pred-table">
      <thead><tr>
        <th>Target Depth</th>
        <th>At Current Rate</th>
        <th>${modeLabel} Hist. Rate</th>
        <th>${modeLabel} ETA</th>
      </tr></thead><tbody>`;

    for (const target of filteredTargets.sort((a, b) => direction === "down" ? b - a : a - b)) {
      const diff    = target - currentDepth;
      const needed  = Math.abs(diff);
      let curEtaHrs = null;
      if (direction === "up"   && diff > 0 && rate > 0) curEtaHrs = diff / rate;
      if (direction === "down" && diff < 0 && rate < 0) curEtaHrs = diff / rate;

      const hRate    = avgRate(histRateMap, currentDepth, target);
      const hRateStr = hRate !== null ? `${hRate.toFixed(2)}" /hr avg` : "No history yet";
      const hEta     = hRate !== null ? (fmtEta(needed / hRate) || "—") : "—";

      const arrow    = target > currentDepth ? "↑" : "↓";
      const arrowCls = target > currentDepth ? "ev-up" : "ev-down";

      html += `<tr>
        <td class="pred-target"><span class="${arrowCls}">${arrow}</span> ${target}"</td>
        <td class="pred-est">${curEtaHrs !== null
          ? `~${fmtDuration(curEtaHrs * 3600000)}<br><small style="font-weight:400;color:#86868b">${fmtEta(curEtaHrs) || ""}</small>`
          : '<span class="pred-na">—</span>'}</td>
        <td class="pred-hist">${hRateStr}</td>
        <td class="pred-hist">${hEta !== "—" ? hEta : '<span class="pred-na">No history yet</span>'}</td>
      </tr>`;
    }

    html += `</tbody></table>`;
    return html;
  }

  async function main() {
    const app = document.getElementById("app");
    try {
      const { sensors, history, pump, fetched } = await getData();
      if (!sensors.length) { app.innerHTML = `<div class="error">No sensor data.</div>`; return; }

      const sensorTimelines = buildSensorTimelines(sensors);
      const points          = computeWaterDepthTimeline(sensors);
      const fillTimeline    = computeFillTimeline(sensorTimelines);
      const current         = points[points.length - 1];
      const rate            = fillRate(points);

      const rateStr = rate === null ? "—"
        : rate > 0.05  ? `+${rate.toFixed(1)}" /hr`
        : rate < -0.05 ? `${rate.toFixed(1)}" /hr` : "Stable";
      const rateCls = rate === null ? "flat" : rate > 0.05 ? "up" : rate < -0.05 ? "down" : "flat";
      const pct     = Math.min(100, Math.round((current.waterDepth / MAX_DEPTH) * 100));

      const rate48  = fillRate(points.filter(p => p.ts > Date.now() - 48 * 3600 * 1000));
      const rate48Str = rate48 === null ? "—"
        : rate48 > 0.05  ? `+${rate48.toFixed(1)}"`
        : rate48 < -0.05 ? `${rate48.toFixed(1)}"`
        : "Stable";
      const rate48Cls = rate48 === null ? "flat" : rate48 > 0.05 ? "up" : rate48 < -0.05 ? "down" : "flat";

      const { tubeHtml } = renderProbe(sensorTimelines);
      const eventLog    = renderEventLog(fillTimeline, history, current.waterDepth, rate, pump);
      const predictions = renderPredictions(history, current.waterDepth, rate, pump);
      const valveLog    = renderValveLog(pump);

      // Valve status — prefer localStorage (instant) over pond_data.json (3hr delay)
      const pumpSortedMain = [...(pump || [])].sort((a, b) => new Date(a.ts) - new Date(b.ts));
      const lastPumpFromData = pumpSortedMain[pumpSortedMain.length - 1];
      const localState = JSON.parse(localStorage.getItem("valve_state") || "null");
      // Use whichever is more recent
      const lastPumpEvent = localState && (!lastPumpFromData || new Date(localState.ts) > new Date(lastPumpFromData.ts))
        ? localState : lastPumpFromData;
      const valveIsOn    = lastPumpEvent?.action === "on";
      const valveElapsed = lastPumpEvent ? (Date.now() - new Date(lastPumpEvent.ts).getTime()) : null;
      const valveHrsStr  = valveElapsed !== null ? fmtDuration(valveElapsed) : "unknown";
      const runningGal   = valveIsOn && valveElapsed !== null ? Math.round((valveElapsed / 60000) * FLOW_RATE_GPM) : null;
      const valveStatusHtml = lastPumpEvent
        ? `<div class="valve-status ${valveIsOn ? "valve-on" : "valve-off"}" id="valve-badge">
             <span class="valve-dot"></span>
             Valve ${valveIsOn ? "ON" : "OFF"} &nbsp;·&nbsp; ${valveHrsStr}${runningGal !== null ? ` &nbsp;·&nbsp; ~${runningGal.toLocaleString()} gal` : ""}
           </div>`
        : "";

      const fetchedStr = fetched
        ? new Date(fetched).toLocaleString("en-US", { month: "numeric", day: "numeric", hour: "numeric", minute: "2-digit" })
        : "unknown";

      app.innerHTML = `
        <div class="grid">
          <div>
            <div class="card">
              <h2>Depth View</h2>
              <div class="probe-wrap">
                <div class="probe-tube">${tubeHtml}</div>
              </div>
            </div>
            <div class="card valve-card" id="valve-card" onclick="expandValveCard()">
              <div class="valve-card-collapsed">
                <div class="valve-dot ${valveIsOn ? "valve-on" : "valve-off"}" style="background:${valveIsOn ? "#22c55e" : "#c7c7cc"};${valveIsOn ? "box-shadow:0 0 0 3px rgba(34,197,94,0.25);animation:pulse 1.5s infinite;" : ""}"></div>
                <span class="vc-label">Valve</span>
              </div>
              <div class="valve-card-expanded">
                <h2 style="font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#86868b;margin-bottom:14px;">Valve Log</h2>
                <div class="pump-btns">
                  <button class="pump-btn pump-on" onclick="event.stopPropagation();logPump('on', ${current.waterDepth})">Valve On</button>
                  <button class="pump-btn pump-off" onclick="event.stopPropagation();logPump('off', ${current.waterDepth})">Valve Off</button>
                </div>
                <div class="pump-confirm" id="pump-confirm"></div>
                <div class="pump-lock" id="pump-lock" onclick="event.stopPropagation();toggleLock()"></div>
                <div style="margin-top:10px;"><a href="#" style="font-size:12px;color:#86868b;" onclick="event.preventDefault();event.stopPropagation();collapseValveCard()">Close</a></div>
              </div>
            </div>
          </div>

          <div>
            <div class="card">
              <div class="depth-display">
                <div class="depth-value">${current.waterDepth}"</div>
                <div class="depth-unit">water depth</div>
                <div class="depth-sub">${(current.waterDepth / 12).toFixed(2)} ft &nbsp;·&nbsp; ${pct}% of ${MAX_DEPTH}" capacity</div>
                ${valveStatusHtml}
              </div>
              <div class="stats">
                <div class="stat">
                  <div class="stat-val ${rateCls}">${rateStr}</div>
                  <div class="stat-lbl">Fill Rate (12 hr)</div>
                </div>
                <div class="stat">
                  <div class="stat-val ${rate48Cls}">${rate48Str}</div>
                  <div class="stat-lbl">Fill Rate (48 hr)</div>
                </div>

              </div>
            </div>

            <div class="card">
              <div class="chart-header">
                <h2>Water Level</h2>
                <div style="display:flex;align-items:center;">
                  <div class="range-tabs">
                    <button class="range-tab active" onclick="setRange('7d', this)">7 Days</button>
                    <button class="range-tab" onclick="setRange('30d', this)">Month</button>
                    <button class="range-tab" onclick="setRange('6m', this)">6 Months</button>
                  </div>
                  <button class="measure-btn" id="measureBtn" onclick="toggleMeasure()">⇔ Measure</button>
                </div>
              </div>
              <div class="measure-hint" id="measureHint">Click a start point on the graph</div>
              <div class="measure-result" id="measureResult">
                <div class="measure-stat"><div class="measure-stat-val" id="mTime">—</div><div class="measure-stat-lbl">Time Elapsed</div></div>
                <div class="measure-stat"><div class="measure-stat-val" id="mLevel">—</div><div class="measure-stat-lbl">Level Change</div></div>
                <div class="measure-stat"><div class="measure-stat-val" id="mRate">—</div><div class="measure-stat-lbl">Rate</div></div>
                <div class="measure-stat"><div class="measure-stat-val" id="mGallons">—</div><div class="measure-stat-lbl">Gallons Pumped</div></div>
              </div>
              <div class="chart-wrap"><canvas id="chart"></canvas></div>
              <div class="updated">Data as of ${fetchedStr} &nbsp;·&nbsp; Last sensor reading: ${fmtTime(current.ts)} &nbsp;·&nbsp; <a href="" onclick="location.reload();return false;" style="color:#0071e3;text-decoration:none;">↻ Refresh</a></div>
            </div>

            <div class="card">
              <h2>Water Level History</h2>
              ${eventLog}
            </div>

            <div class="card">
              <h2>Predictions</h2>
              ${predictions}
            </div>

            <div class="card">
              <h2>Valve History</h2>
              ${valveLog}
            </div>
          </div>
        </div>
      `;

      // Store data globally so setRange() can rebuild the chart
      window._chartData = { points, history, pump };
      let _chart = null;

      function buildChart(range) {
        const { points, history, pump } = window._chartData;
        const now = Date.now();
        const cutoffs = { "7d": 7 * 86400000, "30d": 30 * 86400000, "6m": 183 * 86400000 };
        const cutoff  = now - cutoffs[range];

        let chartPoints;
        if (range === "7d") {
          // Full resolution sensor data
          chartPoints = points.filter(p => p.ts >= cutoff);
        } else {
          // Build step-function from history crossing events
          const evts = (history || [])
            .filter(e => e.ts >= cutoff)
            .sort((a, b) => a.ts - b.ts);
          // Seed with the depth at cutoff (last known before cutoff)
          const before = (history || []).filter(e => e.ts < cutoff).sort((a, b) => b.ts - a.ts);
          const seedDepth = before.length ? before[0].depth : (points[0]?.waterDepth ?? 0);
          chartPoints = [{ ts: cutoff, waterDepth: seedDepth }];
          for (const e of evts) {
            chartPoints.push({ ts: e.ts - 1, waterDepth: chartPoints[chartPoints.length - 1].waterDepth });
            chartPoints.push({ ts: e.ts,     waterDepth: e.depth });
          }
          // Append current point
          const last = points[points.length - 1];
          if (last) chartPoints.push({ ts: last.ts, waterDepth: last.waterDepth });
        }

        // Build valve-on shading dataset — darker fill only under the line during on periods
        const pumpSorted = (pump || [])
          .sort((a, b) => new Date(a.ts) - new Date(b.ts));

        // Build list of [onTs, offTs] ranges
        const valveRanges = [];
        for (let i = 0; i < pumpSorted.length; i++) {
          if (pumpSorted[i].action !== "on") continue;
          const onTs  = new Date(pumpSorted[i].ts).getTime();
          const offEv = pumpSorted.slice(i + 1).find(p => p.action === "off");
          const offTs = offEv ? new Date(offEv.ts).getTime() : Infinity;
          valveRanges.push([onTs, offTs]);
        }

        function inValveRange(ts) {
          return valveRanges.some(([on, off]) => ts >= on && ts <= off);
        }

        // Valve-on dataset: water depth when valve is on, null otherwise
        const valveData = chartPoints.map(p => inValveRange(p.ts) ? p.waterDepth : null);

        window._chartData._currentChartPoints = chartPoints;
        if (_chart) _chart.destroy();
        const ctx = document.getElementById("chart").getContext("2d");
        const crosshairPlugin = {
          id: 'crosshair',
          afterDraw(chart) {
            if (chart.tooltip._active && chart.tooltip._active.length) {
              const x = chart.tooltip._active[0].element.x;
              const { top, bottom } = chart.scales.y;
              const c = chart.ctx;
              c.save();
              c.beginPath();
              c.moveTo(x, top);
              c.lineTo(x, bottom);
              c.lineWidth = 1;
              c.strokeStyle = 'rgba(0,0,0,0.18)';
              c.setLineDash([4, 4]);
              c.stroke();
              c.restore();
            }
          }
        };

        _chart = new Chart(ctx, {
          type: "line",
          plugins: [crosshairPlugin],
          data: {
            labels: chartPoints.map(p => fmtTime(p.ts)),
            datasets: [
              {
                label: "Water Depth (in)",
                data: chartPoints.map(p => p.waterDepth),
                borderColor: "#2563eb",
                backgroundColor: "rgba(37,99,235,0.07)",
                borderWidth: 2,
                pointRadius: 0,
                pointHoverRadius: 4,
                fill: true,
                tension: range === "7d" ? 0.3 : 0,
              },
              {
                label: "Valve On",
                data: valveData,
                borderColor: "transparent",
                backgroundColor: "rgba(37,99,235,0.22)",
                borderWidth: 0,
                pointRadius: 0,
                fill: true,
                tension: range === "7d" ? 0.3 : 0,
                spanGaps: false,
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { display: false },
              annotation: {},
              tooltip: {
                mode: 'index',
                intersect: false,
                position: 'nearest',
                filter: item => item.datasetIndex === 0,
                yAlign: 'bottom',
                xAlign: 'center',
                callbacks: {
                  title: items => items[0]?.label ?? '',
                  label: item => `${item.raw}"`
                },
                external: function(context) {
                  const { chart, tooltip } = context;
                  let el = document.getElementById('pond-tooltip');
                  if (!el) {
                    el = document.createElement('div');
                    el.id = 'pond-tooltip';
                    el.style.cssText = 'position:absolute;background:#1d1d1f;color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;pointer-events:none;transition:opacity 0.1s;white-space:nowrap;left:50%;transform:translateX(-50%);';
                    chart.canvas.parentNode.style.position = 'relative';
                    chart.canvas.parentNode.appendChild(el);
                  }
                  if (tooltip.opacity === 0) { el.style.opacity = 0; return; }
                  const item = tooltip.dataPoints?.[0];
                  if (!item) return;
                  el.style.opacity = 1;
                  el.style.bottom = '4px';
                  el.style.top = 'auto';
                  const x = tooltip.caretX;
                  el.style.left = x + 'px';
                  el.textContent = `${item.label}  •  ${item.raw}"`;
                }
              }
            },
            scales: {
              x: { ticks: { maxTicksLimit: 8, font: { size: 11 }, color: "#86868b" }, grid: { display: false } },
              y: {
                min: 0, max: MAX_DEPTH + 4,
                ticks: { callback: v => v + '"', font: { size: 11 }, color: "#86868b" },
                grid: { color: "rgba(0,0,0,0.05)" }
              }
            }
          }
        });
      }

      // ── Measure tool ────────────────────────────────────────────────────────
      window._measureMode = false;
      window._measureA = null;

      window.toggleMeasure = function() {
        window._measureMode = !window._measureMode;
        window._measureA = null;
        const btn = document.getElementById('measureBtn');
        const hint = document.getElementById('measureHint');
        const result = document.getElementById('measureResult');
        btn.classList.toggle('active', window._measureMode);
        hint.classList.toggle('visible', window._measureMode);
        hint.textContent = 'Click a start point on the graph';
        result.classList.remove('visible');
        document.getElementById('chart').style.cursor = window._measureMode ? 'crosshair' : '';
      };

      document.getElementById('chart').addEventListener('click', function(e) {
        if (!window._measureMode || !_chart) return;
        const pts = _chart.getElementsAtEventForMode(e, 'index', { intersect: false }, false);
        if (!pts.length) return;
        const idx = pts[0].index;
        const cp = window._chartData._currentChartPoints;
        if (!cp) return;
        const pt = cp[idx];
        if (!pt) return;

        if (!window._measureA) {
          window._measureA = pt;
          const hint = document.getElementById('measureHint');
          hint.textContent = `Start: ${fmtTime(pt.ts)} @ ${pt.waterDepth}" — now click an end point`;
        } else {
          const a = window._measureA;
          const b = pt;
          window._measureA = null;
          document.getElementById('measureHint').textContent = 'Click a start point on the graph';

          const t1 = Math.min(a.ts, b.ts), t2 = Math.max(a.ts, b.ts);
          const d1 = a.ts <= b.ts ? a.waterDepth : b.waterDepth;
          const d2 = a.ts <= b.ts ? b.waterDepth : a.waterDepth;
          const elapsedMs = t2 - t1;
          const elapsedHrs = elapsedMs / 3600000;
          const levelChange = d2 - d1;
          const rate = elapsedHrs > 0 ? levelChange / elapsedHrs : 0;

          // Gallons pumped = valve-on minutes within window × FLOW_RATE_GPM
          const { pump } = window._chartData;
          const pumpSorted = [...(pump || [])].sort((a, b) => new Date(a.ts) - new Date(b.ts));
          let valveOnMs = 0;
          for (let i = 0; i < pumpSorted.length; i++) {
            if (pumpSorted[i].action !== 'on') continue;
            const onTs = new Date(pumpSorted[i].ts).getTime();
            const offEv = pumpSorted.slice(i + 1).find(p => p.action === 'off');
            const offTs = offEv ? new Date(offEv.ts).getTime() : Date.now();
            const overlapStart = Math.max(onTs, t1);
            const overlapEnd = Math.min(offTs, t2);
            if (overlapEnd > overlapStart) valveOnMs += overlapEnd - overlapStart;
          }
          const gallons = Math.round((valveOnMs / 60000) * FLOW_RATE_GPM);

          // Format time elapsed
          const totalMins = Math.round(elapsedMs / 60000);
          const hrs = Math.floor(totalMins / 60), mins = totalMins % 60;
          const timeStr = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;

          const levelStr = (levelChange >= 0 ? '+' : '') + levelChange.toFixed(1) + '"';
          const rateStr = (rate >= 0 ? '+' : '') + rate.toFixed(2) + '"/hr';
          const gallonsStr = gallons > 0 ? gallons.toLocaleString() : '0';

          document.getElementById('mTime').textContent = timeStr;
          document.getElementById('mLevel').textContent = levelStr;
          document.getElementById('mRate').textContent = rateStr;
          document.getElementById('mGallons').textContent = gallonsStr;
          document.getElementById('measureResult').classList.add('visible');
        }
      });

      window.setRange = function(range, btn) {
        document.querySelectorAll(".range-tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        buildChart(range);
      };

      window._valveOn = valveIsOn;
      buildChart("7d");
      renderPumpLock();

    } catch (err) {
      app.innerHTML = `<div class="card"><div class="error">Error: ${err.message}</div></div>`;
    }
  }

  main();
</script>
</body>
</html>
